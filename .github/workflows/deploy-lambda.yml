name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main # Trigger deployment on push to the main branch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests
        run: npm test
        env:
          CI: true

  deploy:
    needs: test
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Force Node.js 24 for actions

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18 # Use the Node.js version your project requires

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Build the project (if needed)
      - name: Build the project
        run: npm run build # Skip this if your project doesn't require building

      # Step 5: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 6: Deploy to AWS Lambda
      - name: Package Lambda (put dist contents at ZIP root)
        run: |
          # Ensure build artifacts exist
          npm run build
          rm -f function.zip || true
          # Pack dist contents at the zip root so handler 'lambda.handler' resolves to compiled lambda.js
          cd dist
          zip -r ../function.zip . || true
          cd ..
          # Add node_modules and package files
          zip -r function.zip node_modules package.json package-lock.json README.md || true

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ascientehub-backend \
            --zip-file fileb://function.zip
